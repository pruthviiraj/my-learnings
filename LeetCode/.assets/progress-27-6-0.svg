<svg width="480" height="164" viewBox="0 0 480 164" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeetCode · all languages: 33 solved">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Ubuntu, sans-serif; }
    .title { font-size: 12px; font-weight: 600; letter-spacing: .8px; fill: #8b949e; text-transform: uppercase; }
    .big { font-size: 42px; font-weight: 700; fill: #ffa116; }
    .sub, .label, .value, .foot { font-size: 12px; fill: #8b949e; }
    .value { font-weight: 600; }
    .track { fill: #8b949e; fill-opacity: .18; }
    /* Visible by default so the card still renders where CSS animations
       don't run; "backwards" hides elements only while their delay elapses. */
    .big, .sub, .row, .foot { animation: fade .5s ease-out backwards; }
    .sub { animation-delay: 120ms; }
    .foot { animation-delay: 500ms; }
    .bar { transform-box: fill-box; transform-origin: left center; animation: grow .7s cubic-bezier(.2, .8, .2, 1) backwards; }
    @keyframes grow { from { transform: scaleX(0); } }
    @keyframes fade { from { opacity: 0; } }
  </style>
  <rect x=".5" y=".5" width="479" height="163" rx="10" stroke="#8b949e" stroke-opacity=".25"/>
  <text x="24" y="32" class="title">LeetCode · all languages</text>
  <text x="24" y="96" class="big">33</text>
  <text x="26" y="118" class="sub">solved</text>
  <g class="row" style="animation-delay:150ms">
    <text x="148" y="73" text-anchor="end" class="label">Easy</text>
    <rect x="160" y="64" width="240" height="10" rx="5" class="track"/>
    <rect x="160" y="64" width="196" height="10" rx="5" fill="#00b8a3" class="bar" style="animation-delay:220ms"/>
    <text x="410" y="73" class="value">27</text>
  </g>
  <g class="row" style="animation-delay:270ms">
    <text x="148" y="101" text-anchor="end" class="label">Medium</text>
    <rect x="160" y="92" width="240" height="10" rx="5" class="track"/>
    <rect x="160" y="92" width="44" height="10" rx="5" fill="#ffc01e" class="bar" style="animation-delay:340ms"/>
    <text x="410" y="101" class="value">6</text>
  </g>
  <g class="row" style="animation-delay:390ms">
    <text x="148" y="129" text-anchor="end" class="label">Hard</text>
    <rect x="160" y="120" width="240" height="10" rx="5" class="track"/>
    <text x="410" y="129" class="value">0</text>
  </g>
  <text x="410" y="148" text-anchor="end" class="foot">updated Jul 15, 2026</text>
</svg>
